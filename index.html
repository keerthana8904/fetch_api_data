<!doctype html>
<html>
  <head>
    <title>Todo App</title>
    <style>
      body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        margin-top: 50px;
        background: #f4f4f4;
      }

      .app {
        background: white;
        padding: 20px;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
      }

      input {
        width: 70%;
        padding: 10px;
      }

      button {
        padding: 10px;
        background: blue;
        color: white;
        border: none;
      }

      li {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        cursor: pointer;
      }

      .done {
        text-decoration: line-through;
        color: gray;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <h2>Todo App</h2>
      <input id="task" placeholder="Enter task" />
      <button onclick="addTask()">Add</button>
      <ul id="list"></ul>
    </div>

    <script>
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

      function render() {
        let list = document.getElementById("list");
        list.innerHTML = "";

        tasks.forEach((t, i) => {
          let li = document.createElement("li");
          li.innerHTML =
            t.text + " <button onclick='deleteTask(" + i + ")'>X</button>";

          if (t.done) li.classList.add("done");

          li.onclick = () => toggle(i);

          list.appendChild(li);
        });

        localStorage.setItem("tasks", JSON.stringify(tasks));
      }

      function addTask() {
        let input = document.getElementById("task");
        if (input.value === "") return;

        tasks.push({ text: input.value, done: false });
        input.value = "";
        render();
      }

      function deleteTask(i) {
        tasks.splice(i, 1);
        render();
      }

      function toggle(i) {
        tasks[i].done = !tasks[i].done;
        render();
      }

      render();
    </script>
  </body>
</html>
